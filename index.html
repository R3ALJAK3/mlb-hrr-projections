<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB HRR Projections 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Dashboard() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // This pulls the data generated by your GitHub Action
                fetch('./data.json')
                    .then(res => res.json())
                    .then(json => {
                        setData(json);
                        setLoading(false);
                    })
                    .catch(err => console.error("Data not found yet. Run the Action first!", err));
            }, []);

            if (loading) return <div class="p-10 text-center">Loading Daily Projections...</div>;

            return (
                <div className="max-w-6xl mx-auto p-4">
                    <header className="mb-8 border-b border-slate-700 pb-4">
                        <h1 className="text-3xl font-bold text-blue-400">MLB HRR PROJECTIONS</h1>
                        <p className="text-slate-400">Daily Model-Based Hits + Runs + RBI Forecasts</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {data && Object.keys(data).map(gameKey => (
                            <div key={gameKey} className="bg-slate-800 rounded-lg p-4 shadow-lg border border-slate-700">
                                <h2 className="text-xl font-bold mb-4 border-b border-slate-600 pb-2">{gameKey}</h2>
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="text-slate-400 text-sm">
                                            <th>Player</th>
                                            <th className="text-right">Proj HRR</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {data[gameKey].map((player, idx) => (
                                            <tr key={idx} className="border-b border-slate-700 last:border-0">
                                                <td className="py-2 font-medium">{player.name}</td>
                                                <td className={`py-2 text-right font-bold ${player.hrr > 2.5 ? 'text-green-400' : 'text-amber-400'}`}>
                                                    {player.hrr}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
