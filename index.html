<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB HRR Projections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="mb-8 border-b border-slate-700 pb-4">
        <h1 class="text-3xl font-bold text-blue-400">MLB HRR PROJECTIONS</h1>
        <p class="text-slate-400">Daily Model-Based Hits + Runs + RBI Forecasts</p>
    </header>

    <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <p id="loading" class="text-xl">Loading today's slate...</p>
    </div>

    <script>
        async function loadProjections() {
            try {
                // Fetch the data.json file created by your bot
                const response = await fetch('./data.json');
                const data = await response.json();
                const container = document.getElementById('dashboard');
                const loadingMsg = document.getElementById('loading');
                
                if (Object.keys(data).length === 0) {
                    loadingMsg.innerText = "No data found in data.json. Run your GitHub Action!";
                    return;
                }

                loadingMsg.remove();

                // Loop through each game in the JSON
                for (const game in data) {
                    const gameCard = document.createElement('div');
                    gameCard.className = 'card p-6 rounded-xl shadow-lg';
                    
                    let playersHtml = '';
                    data[game].forEach(player => {
                        playersHtml += `
                            <div class="flex justify-between items-center py-2 border-b border-slate-700 last:border-0">
                                <span class="font-medium">${player.name}</span>
                                <span class="text-blue-400 font-bold">${player.hrr}</span>
                            </div>
                        `;
                    });

                    gameCard.innerHTML = `
                        <h2 class="text-xl font-bold mb-4 text-slate-200 border-b-2 border-blue-500 pb-2">${game}</h2>
                        <div class="space-y-1">${playersHtml}</div>
                    `;
                    container.appendChild(gameCard);
                }
            } catch (error) {
                console.error('Error loading JSON:', error);
                document.getElementById('loading').innerText = "Error loading data. Check console.";
            }
        }

        loadProjections();
    </script>
</body>
</html>
